# Только HTTP (80) — используется при первом деплое, когда сертификата ещё нет.
# После certbot подставляется полный конфиг (deploy/nautilus.nginx.conf).

server {
    listen 80;
    server_name __NAUTILUS_DOMAIN__;
    root __SERVER_PATH__/__DIST_LINK__;
    index index.html;

    location = /favicon.ico {
        alias __SERVER_PATH__/__DIST_LINK__/favicon.svg;
        default_type image/svg+xml;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
