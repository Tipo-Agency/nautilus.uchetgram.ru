# Эталонный конфиг nginx — подставляется при деплое (SERVER_PATH, DIST_LINK, NAUTILUS_DOMAIN).
# Копируется в /etc/nginx/sites-available/nautilus.uchetgram.ru.
# HTTPS уже в шаблоне (пути Let's Encrypt), чтобы деплой не затирал конфиг.

server {
    listen 80;
    server_name __NAUTILUS_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __NAUTILUS_DOMAIN__;
    ssl_certificate     /etc/letsencrypt/live/__NAUTILUS_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__NAUTILUS_DOMAIN__/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root __SERVER_PATH__/__DIST_LINK__;
    index index.html;

    location = /favicon.ico {
        alias __SERVER_PATH__/__DIST_LINK__/favicon.svg;
        default_type image/svg+xml;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
