# Эталонный конфиг nginx — подставляется при деплое (SERVER_PATH, DIST_LINK).
# Копируется в /etc/nginx/sites-available/nautilus.uchetgram.ru и перезагружается nginx.
# HTTPS: после получения сертификата certbot добавит server { listen 443 ssl; ... } в этот файл.

server {
    listen 80;
    server_name nautilus.uchetgram.ru;
    root __SERVER_PATH__/__DIST_LINK__;
    index index.html;

    location = /favicon.ico {
        alias __SERVER_PATH__/__DIST_LINK__/favicon.svg;
        default_type image/svg+xml;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api {
        # без завершающего слеша: /api/... уходит на backend как /api/...
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
